server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Connect RPC — POST /plexreader.v1.ServiceName/MethodName
    # Must come before the catch-all / location.
    location /plexreader.v1. {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_set_header Authorization $http_authorization;
        client_max_body_size 10m;
    }

    # Swagger UI and health check passthrough.
    location ~ ^/(swagger|healthz) {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    # Flutter web SPA — all unmatched routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm;
    gzip_min_length 1000;
}
