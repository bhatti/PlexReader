name: plexreader
description: Self-hosted RSS reader — PlexReader
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  http: ^1.2.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  file_picker: ^8.1.2
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.1
  intl: ^0.19.0
  flutter_html: ^3.0.0-beta.2
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
